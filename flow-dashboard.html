<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTM ManyChat Flow Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0a0a0a;
  --void-light: #141414;
  --void-card: #1a1a1a;
  --void-border: #2a2a2a;
  --tape-blue: #3b82f6;
  --tape-blue-dim: #1e3a5f;
  --tape-blue-glow: rgba(59,130,246,0.15);
  --burn-orange: #f97316;
  --burn-orange-dim: #5c2d0e;
  --burn-orange-glow: rgba(249,115,22,0.15);
  --text-primary: #e8e8e8;
  --text-secondary: #888;
  --text-dim: #555;
  --green: #22c55e;
  --green-dim: #0a3d1e;
  --green-glow: rgba(34,197,94,0.12);
  --red: #ef4444;
  --purple: #a855f7;
  --purple-dim: #3b1764;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--void-border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.header-brand h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--tape-blue);
  line-height: 1;
}

.header-brand .sub {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-clock {
  font-family: 'Bebas Neue', cursive;
  font-size: 14px;
  color: var(--burn-orange);
  letter-spacing: 2px;
  background: var(--burn-orange-glow);
  border: 1px solid var(--burn-orange-dim);
  padding: 4px 12px;
  border-radius: 4px;
  white-space: nowrap;
}

.search-bar {
  flex: 1;
  max-width: 400px;
  position: relative;
}

.search-bar input {
  width: 100%;
  background: var(--void-light);
  border: 1px solid var(--void-border);
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 8px 12px 8px 36px;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}

.search-bar input:focus {
  border-color: var(--tape-blue);
}

.search-bar::before {
  content: "⌕";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
}

.stats-bar {
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}

.stat-chip {
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.stat-chip span {
  color: var(--tape-blue);
  font-weight: 600;
}

/* NAV TABS */
.nav-tabs {
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  z-index: 99;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--void-border);
  display: flex;
  overflow-x: auto;
  padding: 0 16px;
  gap: 2px;
  scrollbar-width: none;
}

.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-family: 'Bebas Neue', cursive;
  font-size: 13px;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none;
}

.nav-tab:hover { color: var(--text-secondary); }

.nav-tab.active {
  color: var(--tape-blue);
  border-bottom-color: var(--tape-blue);
}

.nav-tab .kw {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--burn-orange);
  margin-left: 6px;
  opacity: 0.7;
}

/* MAIN */
.main {
  margin-top: 96px;
  padding: 24px;
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}

/* PILLAR SECTION */
.pillar-section {
  display: none;
  animation: fadeIn 0.3s ease;
}

.pillar-section.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.pillar-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--void-border);
}

.pillar-header h2 {
  font-family: 'Bebas Neue', cursive;
  font-size: 36px;
  letter-spacing: 4px;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.pillar-header .keyword-badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--burn-orange);
  background: var(--burn-orange-glow);
  border: 1px solid var(--burn-orange-dim);
  padding: 3px 10px;
  border-radius: 4px;
  margin-right: 8px;
}

.pillar-header .angle {
  font-size: 13px;
  color: var(--text-secondary);
  font-style: italic;
  margin-top: 8px;
}

.pillar-header .asset-link {
  font-size: 11px;
  color: var(--tape-blue);
  margin-top: 6px;
  word-break: break-all;
  opacity: 0.7;
}

/* FLOW CONTAINER */
.flow-container {
  position: relative;
  padding-left: 40px;
}

.flow-container::before {
  content: '';
  position: absolute;
  left: 18px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--tape-blue) 0%, var(--void-border) 100%);
  opacity: 0.4;
}

/* FLOW NODE */
.flow-node {
  position: relative;
  margin-bottom: 24px;
}

.flow-node::before {
  content: '';
  position: absolute;
  left: -26px;
  top: 16px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--void-card);
  border: 2px solid var(--tape-blue);
  z-index: 1;
}

.flow-node.entry-node::before {
  background: var(--burn-orange);
  border-color: var(--burn-orange);
  box-shadow: 0 0 12px var(--burn-orange-glow);
}

.flow-node.day7-node::before {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
}

.node-card {
  background: var(--void-card);
  border: 1px solid var(--void-border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.node-card:hover { border-color: var(--tape-blue-dim); }

.node-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--void-border);
  background: rgba(59,130,246,0.04);
}

.node-header.entry-header { background: rgba(249,115,22,0.06); }
.node-header.day7-header { background: rgba(34,197,94,0.06); }

.node-timing {
  display: flex;
  align-items: center;
  gap: 8px;
}

.timing-badge {
  font-family: 'Bebas Neue', cursive;
  font-size: 13px;
  letter-spacing: 1.5px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--tape-blue-dim);
  color: var(--tape-blue);
}

.timing-badge.entry { background: var(--burn-orange-dim); color: var(--burn-orange); }
.timing-badge.day7 { background: var(--green-dim); color: var(--green); }

.timing-delay {
  font-size: 10px;
  color: var(--text-dim);
}

.node-type {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.node-body { padding: 16px; }

.message-copy {
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text-primary);
  white-space: pre-wrap;
  position: relative;
}

.message-copy .no-button-note {
  display: block;
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
}

/* BUTTON BLOCK */
.button-block {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--tape-blue-glow);
  border: 1px solid var(--tape-blue-dim);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.button-block .btn-label {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.button-block .btn-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--tape-blue);
  flex: 1;
}

.button-block .btn-url {
  font-size: 10px;
  color: var(--text-dim);
  word-break: break-all;
  max-width: 100%;
  flex-basis: 100%;
  margin-top: 4px;
}

/* COMMENT REPLIES SECTION */
.comment-replies-group {
  margin-bottom: 16px;
}

.comment-replies-group .cr-label {
  font-family: 'Bebas Neue', cursive;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--burn-orange);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cr-label .arrow {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0;
}

.reply-card {
  background: var(--void-card);
  border: 1px solid var(--burn-orange-dim);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
}

.reply-card:hover {
  border-color: var(--burn-orange);
  background: rgba(249,115,22,0.04);
}

.reply-card .reply-num {
  font-family: 'Bebas Neue', cursive;
  font-size: 11px;
  color: var(--burn-orange);
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.reply-card .reply-text {
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-primary);
}

/* COPY BUTTON */
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--void-light);
  border: 1px solid var(--void-border);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 2;
  letter-spacing: 0.5px;
}

.copy-btn:hover {
  border-color: var(--tape-blue);
  color: var(--tape-blue);
}

.copy-btn.copied {
  border-color: var(--green);
  color: var(--green);
}

/* NODE COPY BTN */
.node-copy-btn {
  background: var(--void-light);
  border: 1px solid var(--void-border);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.node-copy-btn:hover {
  border-color: var(--tape-blue);
  color: var(--tape-blue);
}

.node-copy-btn.copied {
  border-color: var(--green);
  color: var(--green);
}

/* URL COPY */
.url-copy-btn {
  background: none;
  border: 1px solid var(--void-border);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.url-copy-btn:hover { border-color: var(--tape-blue); color: var(--tape-blue); }
.url-copy-btn.copied { border-color: var(--green); color: var(--green); }

/* SECTION DIVIDER */
.flow-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 20px;
  padding-left: 0;
  position: relative;
}

.flow-divider::before {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--void-border);
}

.flow-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--void-border);
}

.flow-divider span {
  font-family: 'Bebas Neue', cursive;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* OVERVIEW TAB */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.overview-card {
  background: var(--void-card);
  border: 1px solid var(--void-border);
  border-radius: 8px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.overview-card:hover {
  border-color: var(--tape-blue-dim);
  transform: translateY(-2px);
}

.overview-card h3 {
  font-family: 'Bebas Neue', cursive;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.overview-card .oc-keyword {
  font-size: 11px;
  font-weight: 600;
  color: var(--burn-orange);
  margin-bottom: 8px;
}

.overview-card .oc-angle {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
  margin-bottom: 12px;
  line-height: 1.5;
}

.overview-card .oc-stats {
  display: flex;
  gap: 16px;
  font-size: 10px;
  color: var(--text-dim);
}

.overview-card .oc-stats span {
  color: var(--tape-blue);
}

/* SEARCH HIGHLIGHT */
.highlight {
  background: rgba(249,115,22,0.3);
  border-radius: 2px;
  padding: 0 2px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
  .search-bar { max-width: 100%; order: 10; flex-basis: 100%; }
  .stats-bar { display: none; }
  .main { padding: 16px; }
  .flow-container { padding-left: 28px; }
  .flow-container::before { left: 10px; }
  .flow-node::before { left: -22px; }
  .pillar-header h2 { font-size: 28px; }
  .header-clock { font-size: 11px; padding: 3px 8px; }
}

/* NO-MATCH */
.no-match {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 13px;
}

.no-match .big { font-size: 40px; margin-bottom: 12px; }

/* SCROLL TO TOP */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  background: var(--void-card);
  border: 1px solid var(--void-border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  transition: all 0.2s;
}

.scroll-top:hover { border-color: var(--tape-blue); color: var(--tape-blue); }
.scroll-top.visible { display: flex; }
</style>
</head>

            return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="color:var(--burn-orange);font-weight:600;min-width:90px;">P${i+1} ${p.keyword}</span>
              <span style="color:var(--text-dim);">Day 5 →</span>
              <span style="color:var(--tape-blue);font-weight:600;">${d5.button.text}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderPillar(pillar, index) {
  return `
    <div class="pillar-section" data-section="${pillar.id}">
      <div class="pillar-header">
        <h2>P${index+1}: ${pillar.name}</h2>
        <span class="keyword-badge">${pillar.keyword}</span>
        <div class="angle">${pillar.angle}</div>
        <div class="asset-link">ASSET: ${pillar.asset} → ${pillar.url}</div>
      </div>

      <!-- COMMENT REPLIES ENTRY -->
      <div class="comment-replies-group">
        <div class="cr-label">
          PUBLIC COMMENT REPLIES (ENTRY POINT)
          <span class="arrow">→ Rotate 1/2/3 per comment section</span>
        </div>
        ${pillar.commentReplies.map((reply, ri) => `
          <div class="reply-card" onclick="copyText(this, '${escapeForAttr(reply)}')">
            <button class="copy-btn" onclick="event.stopPropagation(); copyText(this.parentElement, '${escapeForAttr(reply)}')">COPY</button>
            <div class="reply-num">REPLY ${ri+1}</div>
            <div class="reply-text">${escapeHtml(reply)}</div>
          </div>
        `).join('')}
      </div>

      <div class="flow-divider"><span>DM SEQUENCE FLOW → INSTANT THROUGH DAY 7</span></div>

      <!-- DM FLOW -->
      <div class="flow-container">
        ${pillar.messages.map((msg, mi) => `
          <div class="flow-node ${msg.isEntry ? 'entry-node' : ''} ${msg.isDay7 ? 'day7-node' : ''}" data-search="${escapeForAttr(msg.copy + ' ' + (msg.button ? msg.button.text + ' ' + msg.button.url : ''))}">
            <div class="node-card">
              <div class="node-header ${msg.isEntry ? 'entry-header' : ''} ${msg.isDay7 ? 'day7-header' : ''}">
                <div class="node-timing">
                  <span class="timing-badge ${msg.isEntry ? 'entry' : ''} ${msg.isDay7 ? 'day7' : ''}">${msg.timing}</span>
                  <span class="timing-delay">${msg.delay}</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span class="node-type">${msg.type}</span>
                  <button class="node-copy-btn" onclick="copyNodeText(this, ${index}, ${mi})">COPY ALL</button>
                </div>
              </div>
              <div class="node-body">
                <div class="message-copy">${escapeHtml(msg.copy)}${msg.noButton ? '<span class="no-button-note">(No button. Text-only deepening. Let the stat do the work.)</span>' : ''}</div>
                ${msg.button ? `
                  <div class="button-block">
                    <span class="btn-label">BUTTON</span>
                    <span class="btn-text">${escapeHtml(msg.button.text)}</span>
                    <button class="url-copy-btn" onclick="copyUrl(this, '${escapeForAttr(msg.button.url)}')">COPY URL</button>
                    <span class="btn-url">${escapeHtml(msg.button.url)}</span>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- MANYCHAT SETUP NOTES -->
      <div class="flow-divider"><span>MANYCHAT SETUP CHECKLIST</span></div>
      <div style="background:var(--void-card);border:1px solid var(--void-border);border-radius:8px;padding:16px;font-size:12px;color:var(--text-secondary);line-height:1.8;">
        <div>1. Create keyword trigger: comment = <span style="color:var(--burn-orange);font-weight:600;">${pillar.keyword}</span></div>
        <div>2. Set Instant Reply as immediate auto-response</div>
        <div>3. Add Day 1, 3, 5, 7 as Smart Delay nodes (24hr, 72hr, 120hr, 168hr)</div>
        <div>4. Add each button as "Open Website" type below the text block</div>
        <div>5. Tag subscriber with <span style="color:var(--burn-orange);">${pillar.keyword}</span> on Instant Reply node</div>
        <div>6. Optional: Add "Reply STOP to unsubscribe" on Day 7 for compliance</div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escapeForAttr(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

function buildAll() {
  let html = renderOverview();
  PILLARS.forEach((p, i) => { html += renderPillar(p, i); });
  mainEl.innerHTML = html;
  showSection(activeTab);
}

function showSection(id) {
  document.querySelectorAll('.pillar-section').forEach(s => s.classList.remove('active'));
  const target = document.querySelector(`[data-section="${id}"]`);
  if (target) target.classList.add('active');
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.nav-tab[data-tab="${id}"]`);
  if (tab) tab.classList.add('active');
  showSection(id);
  window.scrollTo({ top: 96, behavior: 'smooth' });
}

// NAV CLICKS
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// COPY FUNCTIONS
function copyText(el, text) {
  const decoded = text.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g, '\\');
  navigator.clipboard.writeText(decoded).then(() => {
    const btn = el.querySelector('.copy-btn');
    if (btn) {
      btn.textContent = 'COPIED';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500);
    }
  });
}

function copyNodeText(btn, pillarIdx, msgIdx) {
  const msg = PILLARS[pillarIdx].messages[msgIdx];
  let fullText = msg.copy;
  if (msg.button) {
    fullText += '\n\n[BUTTON] "' + msg.button.text + '" → ' + msg.button.url;
  }
  navigator.clipboard.writeText(fullText).then(() => {
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY ALL'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyUrl(btn, url) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY URL'; btn.classList.remove('copied'); }, 1500);
  });
}

// SEARCH
searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase().trim();
  if (!query) {
    // Reset: show active section normally
    document.querySelectorAll('.flow-node, .reply-card').forEach(el => { el.style.display = ''; });
    document.querySelectorAll('.highlight').forEach(h => {
      h.outerHTML = h.textContent;
    });
    return;
  }

  // Show all pillar sections for searching, hide overview
  document.querySelectorAll('.pillar-section').forEach(s => {
    if (s.dataset.section === 'overview') {
      s.classList.remove('active');
    } else {
      s.classList.add('active');
    }
  });

  // Filter nodes
  document.querySelectorAll('.flow-node').forEach(node => {
    const text = (node.dataset.search || node.textContent).toLowerCase();
    node.style.display = text.includes(query) ? '' : 'none';
  });

  document.querySelectorAll('.reply-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(query) ? '' : 'none';
  });

  // Update nav
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
});

// SCROLL TOP
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});
scrollTopBtn.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// CLOCK UPDATE
function updateClock() {
  const target = new Date('2030-11-30T23:59:59');
  const now = new Date();
  const days = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  document.getElementById('clock').textContent = `🕒 THE CLOCK: ${days.toLocaleString()} DAYS`;
}
updateClock();

// INIT
buildAll();
</script>

</body>
</html>
